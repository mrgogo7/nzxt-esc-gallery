<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZXT Web Integration Test Screen</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow-y: auto;
        }

        h1 {
            color: #9b59b6;
            text-align: center;
            border-bottom: 2px solid #9b59b6;
            padding-bottom: 10px;
            margin-top: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
        }

        .section-title {
            color: #00d2ff;
            font-size: 1.2em;
            margin-bottom: 10px;
            text-transform: uppercase;
            border-bottom: 1px dashed #333;
            padding-bottom: 5px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .data-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
        }

        .data-label {
            color: #aaaaaa;
        }

        .data-value {
            color: #2ecc71;
            font-weight: bold;
        }

        .raw-data {
            background-color: #000;
            color: #00ff00;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 0.8em;
            white-space: pre-wrap;
        }

        /* Syntax Highlighting */
        .string { color: #f1c40f; }
        .number { color: #3498db; }
        .boolean { color: #e74c3c; }
        .null { color: #e74c3c; font-weight: bold; }
        .key { color: #e67e22; }

    </style>
</head>
<body>

    <h1>NZXT CAM Integration Test</h1>

    <div class="container">
        <!-- Rendered Data Sections -->
        <div id="rendered-data">
            <!-- Sections will be injected here -->
        </div>

        <!-- Raw JSON Data Section -->
        <div class="section">
            <div class="section-title">Raw Monitoring Data</div>
            <pre class="raw-data" id="raw-json">Waiting for data...</pre>
        </div>
    </div>

    <script>
        // Simple syntax highlighter for JSON
        function syntaxHighlight(json) {
            if (typeof json != 'string') {
                json = JSON.stringify(json, undefined, 2);
            }
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                var cls = 'number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'key';
                    } else {
                        cls = 'string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'boolean';
                } else if (/null/.test(match)) {
                    cls = 'null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        // Formats data to a friendly string
        function formatData(value, suffix = '') {
            if (value === undefined || value === null) return 'N/A';
            if (typeof value === 'number') {
                // Keep max 2 decimal places
                return Math.round(value * 100) / 100 + suffix;
            }
            return value + suffix;
        }

        // Generates HTML for a grid of key-value pairs
        function generateGrid(dataObj, fieldsAndSuffixes) {
            let html = '<div class="data-grid">';
            for (const [key, label, suffix] of fieldsAndSuffixes) {
                html += `
                    <div class="data-item">
                        <span class="data-label">${label}:</span>
                        <span class="data-value">${formatData(dataObj[key], suffix)}</span>
                    </div>
                `;
            }
            html += '</div>';
            return html;
        }

        // Update the UI with new monitoring data
        function updateUI(data) {
            const renderedDataEl = document.getElementById('rendered-data');
            const rawJsonEl = document.getElementById('raw-json');

            // Update Raw JSON
            rawJsonEl.innerHTML = syntaxHighlight(data);

            let html = '';

            // CPUs
            if (data.cpus && data.cpus.length > 0) {
                data.cpus.forEach((cpu, index) => {
                    html += `<div class="section">
                        <div class="section-title">CPU ${index}: ${cpu.name || 'Unknown'}</div>`;

                    const fields = [
                        ['load', 'Load', '%'],
                        ['temperature', 'Temp', '°C'],
                        ['frequency', 'Freq', ' MHz'],
                        ['fanSpeed', 'Fan', ' RPM'],
                        ['power', 'Power', ' W']
                    ];

                    // Multiply load by 100 for percentage
                    const c = {...cpu};
                    if(c.load !== undefined) c.load = c.load * 100;

                    html += generateGrid(c, fields);
                    html += `</div>`;
                });
            }

            // GPUs
            if (data.gpus && data.gpus.length > 0) {
                data.gpus.forEach((gpu, index) => {
                    html += `<div class="section">
                        <div class="section-title">GPU ${index}: ${gpu.name || 'Unknown'}</div>`;

                    const fields = [
                        ['load', 'Load', '%'],
                        ['temperature', 'Temp', '°C'],
                        ['frequency', 'Freq', ' MHz'],
                        ['fanSpeed', 'Fan', ' RPM'],
                        ['power', 'Power', ' W']
                    ];

                    const g = {...gpu};
                    if(g.load !== undefined) g.load = g.load * 100;

                    html += generateGrid(g, fields);
                    html += `</div>`;
                });
            }

            // RAM
            if (data.ram) {
                html += `<div class="section">
                    <div class="section-title">RAM</div>`;

                const fields = [
                    ['totalSize', 'Total', ' MB'],
                    ['inUse', 'In Use', ' MB']
                ];

                html += generateGrid(data.ram, fields);
                html += `</div>`;
            }

            // Kraken
            if (data.kraken) {
                html += `<div class="section">
                    <div class="section-title">Kraken Cooler</div>`;

                const fields = [
                    ['liquidTemperature', 'Liquid Temp', '°C']
                ];

                html += generateGrid(data.kraken, fields);
                html += `</div>`;
            }

            renderedDataEl.innerHTML = html;
        }

        // Initialize NZXT CAM Web Integration API
        window.nzxt = {
            v1: {
                onMonitoringDataUpdate: (data) => {
                    updateUI(data);
                }
            }
        };

        // Mock data for testing outside of CAM
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('test') === '1') {
            console.log("Running in test mode. Generating mock data.");

            setInterval(() => {
                const mockData = {
                    cpus: [
                        {
                            name: "Mock CPU 9900K",
                            load: Math.random() * 0.5 + 0.1, // 10% to 60%
                            temperature: Math.random() * 20 + 40, // 40 to 60 C
                            frequency: 4500,
                            fanSpeed: Math.floor(Math.random() * 500 + 1000),
                            power: Math.random() * 50 + 50
                        }
                    ],
                    gpus: [
                        {
                            name: "Mock GPU RTX 3080",
                            load: Math.random() * 0.8 + 0.2, // 20% to 100%
                            temperature: Math.random() * 30 + 50, // 50 to 80 C
                            frequency: 1800,
                            fanSpeed: Math.floor(Math.random() * 1000 + 1500),
                            power: Math.random() * 200 + 100
                        },
                        {
                            name: "Mock GPU RTX 3080 (Secondary)",
                            load: Math.random() * 0.2, // 0% to 20%
                            temperature: Math.random() * 10 + 40, // 40 to 50 C
                            frequency: 300,
                            fanSpeed: 0,
                            power: 15
                        }
                    ],
                    ram: {
                        totalSize: 32768,
                        inUse: Math.random() * 8192 + 8192 // 8GB to 16GB
                    },
                    kraken: {
                        liquidTemperature: Math.random() * 5 + 30 // 30 to 35 C
                    }
                };

                // Trigger the callback
                if (window.nzxt && window.nzxt.v1 && window.nzxt.v1.onMonitoringDataUpdate) {
                    window.nzxt.v1.onMonitoringDataUpdate(mockData);
                }
            }, 1000);
        }

    </script>
</body>
</html>
